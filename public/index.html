<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BillFlow — Invoice Management</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
:root{
  --primary:#4F46E5;--primary-dark:#3730A3;--primary-light:#EEF2FF;
  --success:#10B981;--warning:#F59E0B;--danger:#EF4444;--info:#3B82F6;
  --gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-300:#D1D5DB;
  --gray-400:#9CA3AF;--gray-500:#6B7280;--gray-600:#4B5563;--gray-700:#374151;
  --gray-800:#1F2937;--gray-900:#111827;
  --white:#ffffff;--sidebar-w:260px;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh;}
.hidden{display:none!important;}

/* ===== LOGIN ===== */
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#4F46E5 0%,#7C3AED 100%);}
.login-card{background:var(--white);border-radius:20px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.login-logo{text-align:center;margin-bottom:32px;}
.login-logo .icon{width:56px;height:56px;background:var(--primary);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:24px;margin-bottom:12px;}
.login-logo h1{font-size:26px;font-weight:700;color:var(--gray-900);}
.login-logo p{color:var(--gray-500);font-size:14px;margin-top:4px;}
.form-group{margin-bottom:20px;}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:6px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 14px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:.2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light);}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit;}
.btn-primary{background:var(--primary);color:#fff;}.btn-primary:hover{background:var(--primary-dark);}
.btn-success{background:var(--success);color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-warning{background:var(--warning);color:#fff;}
.btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary);}
.btn-sm{padding:6px 14px;font-size:13px;}
.btn-block{width:100%;justify-content:center;padding:13px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* ===== LAYOUT ===== */
#appPage{display:flex;min-height:100vh;}
.sidebar{width:var(--sidebar-w);background:var(--gray-900);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:.3s;}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.08);}
.sidebar-logo .logo-inner{display:flex;align-items:center;gap:12px;}
.sidebar-logo .logo-icon{width:40px;height:40px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;}
.sidebar-logo span{font-size:18px;font-weight:700;color:#fff;}
.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;color:rgba(255,255,255,.6);font-size:14px;font-weight:500;cursor:pointer;transition:.2s;margin-bottom:2px;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.active{background:var(--primary);color:#fff;}
.nav-item i{width:18px;text-align:center;}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,.08);}
.user-chip{display:flex;align-items:center;gap:10px;}
.user-avatar{width:36px;height:36px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0;}
.user-info span{display:block;color:#fff;font-size:13px;font-weight:600;}
.user-info small{color:rgba(255,255,255,.5);font-size:11px;}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;}
.topbar{background:var(--white);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:90;}
.topbar h2{font-size:20px;font-weight:700;color:var(--gray-900);}
.topbar-actions{display:flex;align-items:center;gap:12px;}
.content{padding:28px;flex:1;}
.hamburger{display:none;background:none;border:none;cursor:pointer;font-size:20px;color:var(--gray-700);}

/* ===== CARDS ===== */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;margin-bottom:28px;}
.kpi-card{background:var(--white);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;}
.kpi-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.kpi-icon.blue{background:#EFF6FF;color:var(--info);}
.kpi-icon.green{background:#ECFDF5;color:var(--success);}
.kpi-icon.yellow{background:#FFFBEB;color:var(--warning);}
.kpi-icon.red{background:#FEF2F2;color:var(--danger);}
.kpi-icon.purple{background:var(--primary-light);color:var(--primary);}
.kpi-body small{color:var(--gray-500);font-size:12px;font-weight:500;}
.kpi-body strong{display:block;font-size:22px;font-weight:700;color:var(--gray-900);margin-top:2px;}

/* ===== TABLE ===== */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{background:var(--gray-50);padding:12px 16px;text-align:left;font-size:12px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.5px;}
tbody tr{border-bottom:1px solid var(--gray-100);transition:.15s;}
tbody tr:hover{background:var(--gray-50);}
tbody td{padding:14px 16px;font-size:14px;}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;}
.badge-draft{background:#F3F4F6;color:var(--gray-600);}
.badge-sent{background:#EFF6FF;color:var(--info);}
.badge-paid{background:#ECFDF5;color:var(--success);}
.badge-overdue{background:#FEF2F2;color:var(--danger);}
.badge-cancelled{background:#F3F4F6;color:var(--gray-400);}
.badge-active{background:#ECFDF5;color:var(--success);}
.badge-inactive{background:#FEF2F2;color:var(--danger);}
.badge-superadmin{background:var(--primary-light);color:var(--primary);}
.badge-user{background:#F3F4F6;color:var(--gray-600);}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--white);border-radius:16px;width:100%;max-width:620px;max-height:90vh;overflow-y:auto;}
.modal-lg{max-width:820px;}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-size:17px;font-weight:700;}
.modal-body{padding:24px;}
.modal-footer{padding:16px 24px;border-top:1px solid var(--gray-100);display:flex;justify-content:flex-end;gap:10px;}
.close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-400);line-height:1;}
.close-btn:hover{color:var(--gray-700);}

/* ===== ITEMS TABLE ===== */
.items-table th,.items-table td{padding:10px 12px;border:1px solid var(--gray-200);font-size:13px;}
.items-table input{border:none;width:100%;font-family:inherit;font-size:13px;outline:none;background:transparent;}
.items-table th{background:var(--gray-50);}
#addItemBtn{margin-top:10px;}

/* ===== INVOICE PRINT ===== */
.invoice-print{padding:32px;}
.inv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;}
.inv-title{font-size:32px;font-weight:800;color:var(--primary);}
.inv-number{font-size:13px;color:var(--gray-500);margin-top:4px;}
.inv-company{font-size:20px;font-weight:700;}
.inv-section{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:28px;}
.inv-block small{font-size:11px;color:var(--gray-400);text-transform:uppercase;font-weight:600;letter-spacing:.5px;}
.inv-block p{font-size:14px;margin-top:4px;line-height:1.6;}
.inv-totals{margin-top:16px;margin-left:auto;width:280px;}
.inv-totals table{width:100%;}
.inv-totals td{padding:6px 10px;font-size:14px;}
.inv-totals .grand{font-weight:700;font-size:16px;border-top:2px solid var(--gray-900);}

/* ===== ALERT ===== */
.alert{padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:16px;}
.alert-error{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA;}
.alert-success{background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0;}

/* ===== SEARCH BAR ===== */
.search-bar{position:relative;}
.search-bar input{padding:9px 14px 9px 38px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:14px;font-family:inherit;outline:none;width:240px;}
.search-bar input:focus{border-color:var(--primary);}
.search-bar i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gray-400);}

/* ===== SECTION HEADER ===== */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.section-head h3{font-size:16px;font-weight:700;}

/* ===== EMPTY STATE ===== */
.empty{text-align:center;padding:60px 20px;color:var(--gray-400);}
.empty i{font-size:48px;margin-bottom:12px;display:block;}
.empty p{font-size:15px;}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .hamburger{display:block;}
  .kpi-grid{grid-template-columns:1fr 1fr;}
  .inv-section{grid-template-columns:1fr;}
  .inv-header{flex-direction:column;gap:16px;}
  .content{padding:16px;}
  .topbar{padding:14px 16px;}
  .search-bar input{width:100%;}
}
@media(max-width:480px){
  .kpi-grid{grid-template-columns:1fr;}
  .modal{border-radius:12px;}
  .login-card{padding:32px 20px;}
}

/* ===== OVERLAY CLOSE ===== */
.sidebar-overlay{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,.3);}
.sidebar-overlay.open{display:block;}

/* ===== TABS ===== */
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--gray-200);margin-bottom:24px;}
.tab{padding:10px 18px;font-size:14px;font-weight:500;cursor:pointer;color:var(--gray-500);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s;}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600;}

/* ===== SELECT STATUS ===== */
select.status-sel{padding:5px 10px;border-radius:8px;border:1.5px solid var(--gray-200);font-size:13px;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>

<!-- ========== LOGIN PAGE ========== -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon"><i class="fas fa-file-invoice-dollar"></i></div>
      <h1>BillFlow</h1>
      <p>Invoice Management System</p>
    </div>
    <div id="loginAlert"></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="admin@billing.com" value="admin@billing.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" value="password"/>
    </div>
    <button class="btn btn-primary btn-block" onclick="login()">
      <i class="fas fa-sign-in-alt"></i> Sign In
    </button>
    <p style="text-align:center;margin-top:16px;font-size:12px;color:var(--gray-400);">Default: admin@billing.com / password</p>
  </div>
</div>

<!-- ========== APP PAGE ========== -->
<div id="appPage" class="hidden">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-inner">
        <div class="logo-icon"><i class="fas fa-file-invoice-dollar"></i></div>
        <span>BillFlow</span>
      </div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
        <i class="fas fa-th-large"></i> Dashboard
      </div>
      <div class="nav-item" onclick="showPage('invoices')" id="nav-invoices">
        <i class="fas fa-file-invoice"></i> Invoices
      </div>
      <div class="nav-item superadmin-only hidden" onclick="showPage('users')" id="nav-users">
        <i class="fas fa-users"></i> Users
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="sidebarAvatar">A</div>
        <div class="user-info">
          <span id="sidebarName">Admin</span>
          <small id="sidebarRole">SuperAdmin</small>
        </div>
        <button onclick="logout()" style="margin-left:auto;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.4);font-size:16px;" title="Logout">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:14px;">
        <button class="hamburger" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
        <h2 id="pageTitle">Dashboard</h2>
      </div>
      <div class="topbar-actions">
        <span id="topbarDate" style="font-size:13px;color:var(--gray-500);"></span>
      </div>
    </div>

    <div class="content">

      <!-- ===== DASHBOARD ===== -->
      <div id="page-dashboard">
        <div class="kpi-grid" id="kpiGrid"></div>
        <div class="card">
          <div class="section-head">
            <h3><i class="fas fa-clock" style="color:var(--primary)"></i> Recent Invoices</h3>
            <button class="btn btn-outline btn-sm" onclick="showPage('invoices')">View All</button>
          </div>
          <div class="table-wrap" id="recentTable"></div>
        </div>
      </div>

      <!-- ===== INVOICES ===== -->
      <div id="page-invoices" class="hidden">
        <div class="card">
          <div class="section-head">
            <div class="search-bar">
              <i class="fas fa-search"></i>
              <input type="text" id="invSearch" placeholder="Search invoices..." oninput="filterInvoices()"/>
            </div>
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
              <select class="status-sel" id="invStatusFilter" onchange="filterInvoices()">
                <option value="">All Status</option>
                <option value="draft">Draft</option>
                <option value="sent">Sent</option>
                <option value="paid">Paid</option>
                <option value="overdue">Overdue</option>
                <option value="cancelled">Cancelled</option>
              </select>
              <button class="btn btn-primary superadmin-only hidden btn-sm" onclick="openInvoiceModal()">
                <i class="fas fa-plus"></i> New Invoice
              </button>
            </div>
          </div>
          <div class="table-wrap" id="invoicesTable"></div>
        </div>
      </div>

      <!-- ===== USERS ===== -->
      <div id="page-users" class="hidden">
        <div class="card">
          <div class="section-head">
            <div class="search-bar">
              <i class="fas fa-search"></i>
              <input type="text" id="userSearch" placeholder="Search users..." oninput="filterUsers()"/>
            </div>
            <button class="btn btn-primary btn-sm" onclick="openUserModal()">
              <i class="fas fa-plus"></i> Add User
            </button>
          </div>
          <div class="table-wrap" id="usersTable"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ========== USER MODAL ========== -->
<div class="modal-overlay hidden" id="userModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="userModalTitle">Add User</h3>
      <button class="close-btn" onclick="closeModal('userModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div id="userModalAlert"></div>
      <input type="hidden" id="uId"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group"><label>Full Name *</label><input id="uName" placeholder="John Doe"/></div>
        <div class="form-group"><label>Email *</label><input id="uEmail" type="email" placeholder="john@company.com"/></div>
        <div class="form-group"><label>Password *</label><input id="uPassword" type="password" placeholder="Min 6 chars"/></div>
        <div class="form-group"><label>Phone</label><input id="uPhone" placeholder="+91 9876543210"/></div>
        <div class="form-group"><label>Company</label><input id="uCompany" placeholder="Acme Corp"/></div>
        <div class="form-group"><label>Role</label>
          <select id="uRole"><option value="user">User</option><option value="superadmin">SuperAdmin</option></select>
        </div>
      </div>
      <div class="form-group"><label>Address</label><textarea id="uAddress" rows="2" placeholder="Full address..."></textarea></div>
      <div class="form-group" id="uActiveGroup" style="display:none">
        <label>Status</label>
        <select id="uActive"><option value="true">Active</option><option value="false">Inactive</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('userModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser()"><i class="fas fa-save"></i> Save User</button>
    </div>
  </div>
</div>

<!-- ========== INVOICE MODAL ========== -->
<div class="modal-overlay hidden" id="invoiceModal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 id="invModalTitle">Create Invoice</h3>
      <button class="close-btn" onclick="closeModal('invoiceModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div id="invModalAlert"></div>
      <input type="hidden" id="iId"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group">
          <label>Assign to User *</label>
          <select id="iUserId"><option value="">— Select User —</option></select>
        </div>
        <div class="form-group"><label>Invoice Title *</label><input id="iTitle" placeholder="e.g. Website Development"/></div>
        <div class="form-group"><label>Issue Date</label><input id="iIssueDate" type="date"/></div>
        <div class="form-group"><label>Due Date</label><input id="iDueDate" type="date"/></div>
        <div class="form-group"><label>Tax Rate (%)</label><input id="iTaxRate" type="number" value="18" min="0" max="100" oninput="recalcTotal()"/></div>
        <div class="form-group"><label>Discount (₹)</label><input id="iDiscount" type="number" value="0" min="0" oninput="recalcTotal()"/></div>
        <div class="form-group"><label>Status</label>
          <select id="iStatus"><option value="draft">Draft</option><option value="sent">Sent</option><option value="paid">Paid</option><option value="overdue">Overdue</option><option value="cancelled">Cancelled</option></select>
        </div>
      </div>
      <div class="form-group"><label>Description</label><textarea id="iDesc" rows="2" placeholder="Brief description..."></textarea></div>
      <div class="form-group"><label>Notes</label><textarea id="iNotes" rows="2" placeholder="Payment terms, bank details..."></textarea></div>
      <div style="margin-top:8px;">
        <label style="font-size:13px;font-weight:600;color:var(--gray-700)">Line Items *</label>
        <table class="items-table" style="width:100%;margin-top:8px;border-collapse:collapse;">
          <thead>
            <tr><th style="width:45%">Description</th><th style="width:15%">Qty</th><th style="width:20%">Unit Price</th><th style="width:15%">Total</th><th style="width:5%"></th></tr>
          </thead>
          <tbody id="itemsBody"></tbody>
        </table>
        <button class="btn btn-outline btn-sm" id="addItemBtn" onclick="addItemRow()"><i class="fas fa-plus"></i> Add Item</button>
      </div>
      <div style="margin-top:16px;padding:16px;background:var(--gray-50);border-radius:10px;text-align:right;">
        <div style="font-size:13px;color:var(--gray-500)">Subtotal: <strong id="preSubtotal">₹0.00</strong></div>
        <div style="font-size:13px;color:var(--gray-500);margin-top:4px">Discount: <strong id="preDiscount">₹0.00</strong></div>
        <div style="font-size:13px;color:var(--gray-500);margin-top:4px">Tax: <strong id="preTax">₹0.00</strong></div>
        <div style="font-size:16px;font-weight:700;color:var(--gray-900);margin-top:8px;border-top:2px solid var(--gray-200);padding-top:8px">Total: <strong id="preTotal">₹0.00</strong></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('invoiceModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveInvoice()"><i class="fas fa-save"></i> Save Invoice</button>
    </div>
  </div>
</div>

<!-- ========== INVOICE VIEW MODAL ========== -->
<div class="modal-overlay hidden" id="viewModal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3>Invoice Preview</h3>
      <div style="display:flex;gap:10px;align-items:center;">
        <button class="btn btn-outline btn-sm" onclick="printInvoice()"><i class="fas fa-print"></i> Print</button>
        <button class="close-btn" onclick="closeModal('viewModal')">&times;</button>
      </div>
    </div>
    <div class="invoice-print" id="invoicePrintArea"></div>
  </div>
</div>

<script>
const API = '';
let token = localStorage.getItem('bf_token');
let currentUser = JSON.parse(localStorage.getItem('bf_user') || 'null');
let allInvoices = [], allUsers = [];

// ===== UTILS =====
const fmt = (n) => '₹' + parseFloat(n||0).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtDate = (d) => d ? new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const today = () => new Date().toISOString().split('T')[0];

async function apiFetch(url, opts = {}) {
  const res = await fetch(API + url, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`, ...(opts.headers||{}) }
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

function showAlert(elId, msg, type='error') {
  const el = document.getElementById(elId);
  el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(() => el.innerHTML = '', 4000);
}

// ===== AUTH =====
async function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPassword').value;
  if (!email || !pw) return showAlert('loginAlert','Please enter email and password');
  try {
    const data = await apiFetch('/api/auth/login', { method:'POST', body: JSON.stringify({email, password: pw}) });
    token = data.token; currentUser = data.user;
    localStorage.setItem('bf_token', token);
    localStorage.setItem('bf_user', JSON.stringify(currentUser));
    initApp();
  } catch(e) { showAlert('loginAlert', e.message); }
}

function logout() {
  localStorage.removeItem('bf_token'); localStorage.removeItem('bf_user');
  token = null; currentUser = null;
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('appPage').classList.add('hidden');
}

// ===== APP INIT =====
function initApp() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('appPage').classList.remove('hidden');
  document.getElementById('sidebarName').textContent = currentUser.name;
  document.getElementById('sidebarRole').textContent = currentUser.role === 'superadmin' ? 'Super Admin' : 'User';
  document.getElementById('sidebarAvatar').textContent = currentUser.name[0].toUpperCase();
  document.getElementById('topbarDate').textContent = new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  if (currentUser.role === 'superadmin') {
    document.querySelectorAll('.superadmin-only').forEach(el => el.classList.remove('hidden'));
  }
  showPage('dashboard');
}

function showPage(page) {
  ['dashboard','invoices','users'].forEach(p => {
    document.getElementById('page-'+p).classList.add('hidden');
    document.getElementById('nav-'+p)?.classList.remove('active');
  });
  document.getElementById('page-'+page).classList.remove('hidden');
  document.getElementById('nav-'+page)?.classList.add('active');
  const titles = { dashboard:'Dashboard', invoices:'Invoices', users:'User Management' };
  document.getElementById('pageTitle').textContent = titles[page];
  closeSidebar();
  if (page === 'dashboard') loadDashboard();
  if (page === 'invoices') loadInvoices();
  if (page === 'users') loadUsers();
}

// ===== SIDEBAR =====
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

// ===== MODAL =====
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
function openModal(id) { document.getElementById(id).classList.remove('hidden'); }

// ===== DASHBOARD =====
async function loadDashboard() {
  try {
    if (currentUser.role === 'superadmin') {
      const stats = await apiFetch('/api/invoices/stats/summary');
      document.getElementById('kpiGrid').innerHTML = `
        <div class="kpi-card"><div class="kpi-icon blue"><i class="fas fa-file-invoice"></i></div><div class="kpi-body"><small>Total Invoices</small><strong>${stats.total_invoices||0}</strong></div></div>
        <div class="kpi-card"><div class="kpi-icon green"><i class="fas fa-rupee-sign"></i></div><div class="kpi-body"><small>Total Billed</small><strong>${fmt(stats.total_amount)}</strong></div></div>
        <div class="kpi-card"><div class="kpi-icon purple"><i class="fas fa-check-circle"></i></div><div class="kpi-body"><small>Amount Paid</small><strong>${fmt(stats.paid_amount)}</strong></div></div>
        <div class="kpi-card"><div class="kpi-icon red"><i class="fas fa-exclamation-circle"></i></div><div class="kpi-body"><small>Overdue</small><strong>${fmt(stats.overdue_amount)}</strong></div></div>
        <div class="kpi-card"><div class="kpi-icon yellow"><i class="fas fa-users"></i></div><div class="kpi-body"><small>Total Users</small><strong>${stats.total_users||0}</strong></div></div>`;
    }
    const invs = await apiFetch('/api/invoices');
    const recent = invs.slice(0, 7);
    document.getElementById('recentTable').innerHTML = recent.length ? renderInvoiceTable(recent, true) : '<div class="empty"><i class="fas fa-file-invoice"></i><p>No invoices yet</p></div>';
  } catch(e) { console.error(e); }
}

// ===== INVOICES =====
async function loadInvoices() {
  try {
    allInvoices = await apiFetch('/api/invoices');
    renderInvoiceList(allInvoices);
  } catch(e) { console.error(e); }
}

function filterInvoices() {
  const q = document.getElementById('invSearch').value.toLowerCase();
  const st = document.getElementById('invStatusFilter').value;
  const filtered = allInvoices.filter(i =>
    (!st || i.status === st) &&
    (!q || i.invoice_number.toLowerCase().includes(q) || i.title.toLowerCase().includes(q) || (i.user_name||'').toLowerCase().includes(q))
  );
  renderInvoiceList(filtered);
}

function renderInvoiceList(list) {
  document.getElementById('invoicesTable').innerHTML = list.length ? renderInvoiceTable(list) : '<div class="empty"><i class="fas fa-file-alt"></i><p>No invoices found</p></div>';
}

function renderInvoiceTable(list, compact=false) {
  const isAdmin = currentUser.role === 'superadmin';
  return `<table>
    <thead><tr>
      <th>Invoice #</th><th>Title</th>
      ${isAdmin?'<th>Customer</th>':''}
      <th>Issue Date</th><th>Due Date</th><th>Amount</th><th>Status</th><th>Actions</th>
    </tr></thead>
    <tbody>${list.map(inv => `
      <tr>
        <td><strong style="color:var(--primary)">${inv.invoice_number}</strong></td>
        <td>${inv.title}</td>
        ${isAdmin?`<td><div style="font-weight:500">${inv.user_name}</div><div style="font-size:12px;color:var(--gray-400)">${inv.user_email}</div></td>`:''}
        <td>${fmtDate(inv.issue_date)}</td>
        <td>${fmtDate(inv.due_date)}</td>
        <td><strong>${fmt(inv.total)}</strong></td>
        <td>${statusBadge(inv.status)}</td>
        <td>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn btn-outline btn-sm" onclick="viewInvoice('${inv.id}')"><i class="fas fa-eye"></i></button>
            ${isAdmin?`<button class="btn btn-primary btn-sm" onclick="editInvoice('${inv.id}')"><i class="fas fa-edit"></i></button>
            <button class="btn btn-danger btn-sm" onclick="deleteInvoice('${inv.id}','${inv.invoice_number}')"><i class="fas fa-trash"></i></button>`:''}
          </div>
        </td>
      </tr>`).join('')}
    </tbody></table>`;
}

function statusBadge(s) {
  const icons = {draft:'circle',sent:'paper-plane',paid:'check-circle',overdue:'exclamation-triangle',cancelled:'times-circle'};
  return `<span class="badge badge-${s}"><i class="fas fa-${icons[s]||'circle'}"></i>${s.charAt(0).toUpperCase()+s.slice(1)}</span>`;
}

async function openInvoiceModal(inv=null) {
  document.getElementById('invModalTitle').textContent = inv ? 'Edit Invoice' : 'Create Invoice';
  document.getElementById('iId').value = inv?.id || '';
  document.getElementById('iTitle').value = inv?.title || '';
  document.getElementById('iDesc').value = inv?.description || '';
  document.getElementById('iNotes').value = inv?.notes || '';
  document.getElementById('iIssueDate').value = inv?.issue_date?.split('T')[0] || today();
  document.getElementById('iDueDate').value = inv?.due_date?.split('T')[0] || '';
  document.getElementById('iTaxRate').value = inv?.tax_rate ?? 18;
  document.getElementById('iDiscount').value = inv?.discount ?? 0;
  document.getElementById('iStatus').value = inv?.status || 'draft';

  // Load users for dropdown
  const users = await apiFetch('/api/users');
  const sel = document.getElementById('iUserId');
  sel.innerHTML = '<option value="">— Select User —</option>' +
    users.filter(u=>u.role==='user').map(u=>`<option value="${u.id}">${u.name} (${u.email})</option>`).join('');
  if (inv?.user_id) sel.value = inv.user_id;

  // Items
  const tbody = document.getElementById('itemsBody');
  tbody.innerHTML = '';
  (inv?.items || [{}]).forEach(item => addItemRow(item));
  recalcTotal();
  openModal('invoiceModal');
}

function addItemRow(item={}) {
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td><input type="text" placeholder="Service / Product description" value="${item.description||''}"/></td>
    <td><input type="number" placeholder="1" value="${item.quantity||1}" min="0.01" step="0.01" oninput="recalcTotal()"/></td>
    <td><input type="number" placeholder="0.00" value="${item.unit_price||''}" min="0" step="0.01" oninput="recalcTotal()"/></td>
    <td class="row-total" style="font-weight:600">${fmt((item.quantity||1)*(item.unit_price||0))}</td>
    <td><button onclick="this.closest('tr').remove();recalcTotal();" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:14px"><i class="fas fa-times"></i></button></td>`;
  document.getElementById('itemsBody').appendChild(tr);
}

function recalcTotal() {
  let sub = 0;
  document.querySelectorAll('#itemsBody tr').forEach(tr => {
    const inputs = tr.querySelectorAll('input');
    const q = parseFloat(inputs[1]?.value||0), p = parseFloat(inputs[2]?.value||0);
    const t = q*p; sub += t;
    tr.querySelector('.row-total').textContent = fmt(t);
  });
  const disc = parseFloat(document.getElementById('iDiscount')?.value||0);
  const rate = parseFloat(document.getElementById('iTaxRate')?.value||0);
  const tax = (sub - disc) * rate / 100;
  const total = sub - disc + tax;
  document.getElementById('preSubtotal').textContent = fmt(sub);
  document.getElementById('preDiscount').textContent = fmt(disc);
  document.getElementById('preTax').textContent = fmt(tax);
  document.getElementById('preTotal').textContent = fmt(total);
}

function getItemRows() {
  return [...document.querySelectorAll('#itemsBody tr')].map(tr => {
    const inputs = tr.querySelectorAll('input');
    return { description: inputs[0].value.trim(), quantity: parseFloat(inputs[1].value||1), unit_price: parseFloat(inputs[2].value||0) };
  }).filter(i => i.description && i.unit_price > 0);
}

async function saveInvoice() {
  const id = document.getElementById('iId').value;
  const items = getItemRows();
  if (!items.length) return showAlert('invModalAlert','Add at least one valid line item');
  const body = {
    user_id: document.getElementById('iUserId').value,
    title: document.getElementById('iTitle').value.trim(),
    description: document.getElementById('iDesc').value,
    notes: document.getElementById('iNotes').value,
    due_date: document.getElementById('iDueDate').value || null,
    tax_rate: parseFloat(document.getElementById('iTaxRate').value||18),
    discount: parseFloat(document.getElementById('iDiscount').value||0),
    status: document.getElementById('iStatus').value,
    items
  };
  if (!body.user_id || !body.title) return showAlert('invModalAlert','User and title are required');
  try {
    if (id) await apiFetch(`/api/invoices/${id}`, {method:'PUT', body:JSON.stringify(body)});
    else await apiFetch('/api/invoices', {method:'POST', body:JSON.stringify(body)});
    closeModal('invoiceModal');
    loadInvoices();
    if (document.getElementById('page-dashboard').classList.contains('hidden') === false) loadDashboard();
  } catch(e) { showAlert('invModalAlert', e.message); }
}

async function editInvoice(id) {
  try {
    const inv = await apiFetch(`/api/invoices/${id}`);
    openInvoiceModal(inv);
  } catch(e) { alert(e.message); }
}

async function deleteInvoice(id, num) {
  if (!confirm(`Delete invoice ${num}? This cannot be undone.`)) return;
  try {
    await apiFetch(`/api/invoices/${id}`, {method:'DELETE'});
    loadInvoices();
  } catch(e) { alert(e.message); }
}

async function viewInvoice(id) {
  try {
    const inv = await apiFetch(`/api/invoices/${id}`);
    document.getElementById('invoicePrintArea').innerHTML = buildInvoiceHTML(inv);
    openModal('viewModal');
  } catch(e) { alert(e.message); }
}

function buildInvoiceHTML(inv) {
  const items = inv.items || [];
  return `<div class="inv-header">
    <div>
      <div class="inv-title">INVOICE</div>
      <div class="inv-number">${inv.invoice_number}</div>
      <div style="margin-top:8px">${statusBadge(inv.status)}</div>
    </div>
    <div style="text-align:right">
      <div class="inv-company" style="color:var(--primary)">BillFlow</div>
      <div style="font-size:13px;color:var(--gray-500);margin-top:4px">Invoice Management System</div>
    </div>
  </div>
  <div class="inv-section">
    <div class="inv-block">
      <small>Billed To</small>
      <p><strong>${inv.user_name||'—'}</strong><br>${inv.user_email||''}<br>${inv.user_phone||''}<br>${inv.user_company||''}<br>${inv.user_address||''}</p>
    </div>
    <div class="inv-block">
      <small>Invoice Details</small>
      <p>Issue Date: <strong>${fmtDate(inv.issue_date)}</strong><br>Due Date: <strong>${fmtDate(inv.due_date)}</strong><br>Created By: <strong>${inv.created_by_name||'—'}</strong></p>
    </div>
  </div>
  <div style="font-weight:700;margin-bottom:8px;color:var(--gray-700);">${inv.title}</div>
  ${inv.description?`<p style="font-size:13px;color:var(--gray-500);margin-bottom:12px">${inv.description}</p>`:''}
  <table style="width:100%;border-collapse:collapse;">
    <thead><tr style="background:var(--gray-100)">
      <th style="padding:10px 14px;text-align:left;font-size:12px;color:var(--gray-500);text-transform:uppercase">#</th>
      <th style="padding:10px 14px;text-align:left;font-size:12px;color:var(--gray-500);text-transform:uppercase">Description</th>
      <th style="padding:10px 14px;text-align:right;font-size:12px;color:var(--gray-500);text-transform:uppercase">Qty</th>
      <th style="padding:10px 14px;text-align:right;font-size:12px;color:var(--gray-500);text-transform:uppercase">Unit Price</th>
      <th style="padding:10px 14px;text-align:right;font-size:12px;color:var(--gray-500);text-transform:uppercase">Total</th>
    </tr></thead>
    <tbody>${items.map((it,i)=>`<tr style="border-bottom:1px solid var(--gray-100)">
      <td style="padding:10px 14px;font-size:13px;color:var(--gray-500)">${i+1}</td>
      <td style="padding:10px 14px;font-size:14px">${it.description}</td>
      <td style="padding:10px 14px;text-align:right;font-size:14px">${it.quantity}</td>
      <td style="padding:10px 14px;text-align:right;font-size:14px">${fmt(it.unit_price)}</td>
      <td style="padding:10px 14px;text-align:right;font-size:14px;font-weight:500">${fmt(it.total)}</td>
    </tr>`).join('')}</tbody>
  </table>
  <div class="inv-totals">
    <table><tbody>
      <tr><td style="color:var(--gray-500)">Subtotal</td><td style="text-align:right">${fmt(inv.subtotal)}</td></tr>
      ${inv.discount>0?`<tr><td style="color:var(--gray-500)">Discount</td><td style="text-align:right;color:var(--success)">- ${fmt(inv.discount)}</td></tr>`:''}
      <tr><td style="color:var(--gray-500)">GST (${inv.tax_rate}%)</td><td style="text-align:right">${fmt(inv.tax_amount)}</td></tr>
      <tr class="grand"><td>Total</td><td style="text-align:right;color:var(--primary)">${fmt(inv.total)}</td></tr>
    </tbody></table>
  </div>
  ${inv.notes?`<div style="margin-top:24px;padding:16px;background:var(--gray-50);border-radius:10px;font-size:13px;color:var(--gray-600)"><strong>Notes:</strong> ${inv.notes}</div>`:''}`;
}

function printInvoice() {
  const html = document.getElementById('invoicePrintArea').innerHTML;
  const win = window.open('','_blank');
  win.document.write(`<html><head><title>Invoice</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>body{font-family:Inter,sans-serif;padding:40px;max-width:800px;margin:0 auto;color:#1F2937;}
    .inv-title{font-size:32px;font-weight:800;color:#4F46E5;}.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;background:#EFF6FF;color:#3B82F6;}
    </style></head><body>${html}</body></html>`);
  win.document.close(); win.print();
}

// ===== USERS =====
async function loadUsers() {
  try {
    allUsers = await apiFetch('/api/users');
    renderUserList(allUsers);
  } catch(e) { console.error(e); }
}

function filterUsers() {
  const q = document.getElementById('userSearch').value.toLowerCase();
  renderUserList(allUsers.filter(u => u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q) || (u.company||'').toLowerCase().includes(q)));
}

function renderUserList(list) {
  document.getElementById('usersTable').innerHTML = list.length ? `
    <table><thead><tr>
      <th>Name</th><th>Email</th><th>Company</th><th>Phone</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th>
    </tr></thead>
    <tbody>${list.map(u=>`<tr>
      <td><div style="display:flex;align-items:center;gap:10px"><div class="user-avatar" style="width:32px;height:32px;font-size:12px;background:var(--primary);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0">${u.name[0].toUpperCase()}</div><strong>${u.name}</strong></div></td>
      <td>${u.email}</td>
      <td>${u.company||'—'}</td>
      <td>${u.phone||'—'}</td>
      <td><span class="badge badge-${u.role}">${u.role}</span></td>
      <td><span class="badge badge-${u.is_active?'active':'inactive'}">${u.is_active?'Active':'Inactive'}</span></td>
      <td>${fmtDate(u.created_at)}</td>
      <td><div style="display:flex;gap:6px">
        <button class="btn btn-primary btn-sm" onclick='editUser(${JSON.stringify(u)})'><i class="fas fa-edit"></i></button>
        <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}','${u.name}')"><i class="fas fa-trash"></i></button>
      </div></td>
    </tr>`).join('')}</tbody></table>` :
    '<div class="empty"><i class="fas fa-users"></i><p>No users found</p></div>';
}

function openUserModal() {
  document.getElementById('uId').value = '';
  document.getElementById('uName').value = '';
  document.getElementById('uEmail').value = '';
  document.getElementById('uPassword').value = '';
  document.getElementById('uPhone').value = '';
  document.getElementById('uCompany').value = '';
  document.getElementById('uAddress').value = '';
  document.getElementById('uRole').value = 'user';
  document.getElementById('uActiveGroup').style.display = 'none';
  document.getElementById('userModalTitle').textContent = 'Add User';
  document.getElementById('uPassword').closest('.form-group').querySelector('label').textContent = 'Password *';
  openModal('userModal');
}

function editUser(u) {
  document.getElementById('uId').value = u.id;
  document.getElementById('uName').value = u.name;
  document.getElementById('uEmail').value = u.email;
  document.getElementById('uEmail').disabled = true;
  document.getElementById('uPassword').value = '';
  document.getElementById('uPhone').value = u.phone||'';
  document.getElementById('uCompany').value = u.company||'';
  document.getElementById('uAddress').value = u.address||'';
  document.getElementById('uRole').value = u.role;
  document.getElementById('uActive').value = String(u.is_active);
  document.getElementById('uActiveGroup').style.display = 'block';
  document.getElementById('userModalTitle').textContent = 'Edit User';
  document.getElementById('uPassword').closest('.form-group').querySelector('label').textContent = 'New Password (leave blank to keep)';
  openModal('userModal');
}

async function saveUser() {
  const id = document.getElementById('uId').value;
  const name = document.getElementById('uName').value.trim();
  const email = document.getElementById('uEmail').value.trim();
  const pw = document.getElementById('uPassword').value;
  if (!name || !email) return showAlert('userModalAlert','Name and email are required');
  if (!id && !pw) return showAlert('userModalAlert','Password is required for new users');

  try {
    if (id) {
      await apiFetch(`/api/users/${id}`, {method:'PUT', body:JSON.stringify({
        name, phone:document.getElementById('uPhone').value, company:document.getElementById('uCompany').value,
        address:document.getElementById('uAddress').value, is_active:document.getElementById('uActive').value==='true'
      })});
      if (pw) await apiFetch(`/api/users/${id}/password`, {method:'PATCH', body:JSON.stringify({password:pw})});
    } else {
      await apiFetch('/api/users', {method:'POST', body:JSON.stringify({
        name, email, password:pw, phone:document.getElementById('uPhone').value,
        company:document.getElementById('uCompany').value, address:document.getElementById('uAddress').value,
        role:document.getElementById('uRole').value
      })});
    }
    document.getElementById('uEmail').disabled = false;
    closeModal('userModal');
    loadUsers();
  } catch(e) { showAlert('userModalAlert', e.message); }
}

async function deleteUser(id, name) {
  if (!confirm(`Delete user "${name}"? All their invoices will also be deleted.`)) return;
  try {
    await apiFetch(`/api/users/${id}`, {method:'DELETE'});
    loadUsers();
  } catch(e) { alert(e.message); }
}

// ===== AUTO-START =====
if (token && currentUser) {
  initApp();
}

// Enter key login
document.getElementById('loginPassword').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
</script>
